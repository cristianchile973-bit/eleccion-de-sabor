<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¿Cuál Eliges?</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="fondo-animado"></div>
    
    <div class="container">
        <div class="header">
            <h1 class="titulo">¿Cuál Eliges?</h1>
            <p class="subtitulo">Selecciona tu sabor favorito</p>
        </div>

        <div class="contenedor-opciones">
            <div class="opcion-card" data-sabor="Fresa">
                <div class="emoji-grande">🍓</div>
                <h2>Fresa</h2>
                <p class="descripcion">Dulce y refrescante</p>
                <button class="btn-opcion">Elegir</button>
            </div>

            <div class="opcion-card" data-sabor="Guineo">
                <div class="emoji-grande">🍌</div>
                <h2>Guineo</h2>
                <p class="descripcion">Cremoso y suave</p>
                <button class="btn-opcion">Elegir</button>
            </div>

            <div class="opcion-card" data-sabor="Galleta Oreo">
                <div class="emoji-grande">🍪</div>
                <h2>Galleta Oreo</h2>
                <p class="descripcion">Crujiente y delicioso</p>
                <button class="btn-opcion">Elegir</button>
            </div>
        </div>

        <div class="resultado" id="resultado">
            <div class="resultado-contenido">
                <h2 class="resultado-titulo-final">Gracias por elegir</h2>
                <p class="resultado-texto-final">Amanda Camila😺</p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
